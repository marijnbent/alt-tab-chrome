<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tab Switcher</title>
  <style>
    :root {
      --bg: #0f172a;
      --text: #e2e8f0;
      --muted: #64748b;
      --divider: rgba(148, 163, 184, 0.1);
      --kbd-bg: rgba(148, 163, 184, 0.08);
      --kbd-border: rgba(148, 163, 184, 0.18);
      --kbd-text: #94a3b8;
      --seg-bg: rgba(148, 163, 184, 0.08);
      --seg-active-bg: rgba(148, 163, 184, 0.16);
      --seg-active-text: #e2e8f0;
      --seg-inactive-text: #64748b;
      --button-bg: #1e3a8a;
      --button-text: #bfdbfe;
      --button-hover-bg: #1e40af;
    }

    :root[data-theme="light"] {
      --bg: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --divider: rgba(15, 23, 42, 0.07);
      --kbd-bg: rgba(15, 23, 42, 0.05);
      --kbd-border: rgba(15, 23, 42, 0.12);
      --kbd-text: #475569;
      --seg-bg: rgba(15, 23, 42, 0.05);
      --seg-active-bg: rgba(15, 23, 42, 0.1);
      --seg-active-text: #0f172a;
      --seg-inactive-text: #64748b;
      --button-bg: #1e40af;
      --button-text: #fff;
      --button-hover-bg: #1d4ed8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 18px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 1px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Sections ── */
    .section {
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* ── Segmented control ── */
    .seg-control {
      display: flex;
      background: var(--seg-bg);
      border-radius: 7px;
      padding: 2px;
      gap: 2px;
    }

    .seg-control input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .seg-control label {
      flex: 1;
    }

    .seg-control label span {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--seg-inactive-text);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      user-select: none;
    }

    .seg-control input:checked + span {
      background: var(--seg-active-bg);
      color: var(--seg-active-text);
    }

    /* ── Shortcut rows ── */
    .shortcut-list {
      display: flex;
      flex-direction: column;
    }

    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid var(--divider);
    }

    .shortcut-row:last-child {
      border-bottom: none;
    }

    .shortcut-label {
      color: var(--text);
    }

    .keys {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }

    kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1px 5px;
      min-width: 20px;
      height: 19px;
      border-radius: 4px;
      background: var(--kbd-bg);
      border: 1px solid var(--kbd-border);
      font: inherit;
      font-size: 11px;
      color: var(--kbd-text);
      line-height: 1;
    }

    /* ── Button ── */
    button {
      width: 100%;
      border: none;
      border-radius: 7px;
      padding: 9px 12px;
      background: var(--button-bg);
      color: var(--button-text);
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.1s;
    }

    button:hover { background: var(--button-hover-bg); }
    button:active { opacity: 0.88; }
    button:disabled { opacity: 0.38; cursor: default; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Tab Switcher</h1>
    <p class="subtitle">Keyboard shortcuts and popup styling.</p>
  </div>

  <section class="section">
    <p class="section-title">Theme</p>
    <div class="seg-control" role="radiogroup" aria-label="Theme">
      <label>
        <input type="radio" name="theme-mode" value="system">
        <span>System</span>
      </label>
      <label>
        <input type="radio" name="theme-mode" value="light">
        <span>Light</span>
      </label>
      <label>
        <input type="radio" name="theme-mode" value="dark">
        <span>Dark</span>
      </label>
    </div>
  </section>

  <section class="section">
    <p class="section-title">Shortcuts</p>
    <div class="shortcut-list">
      <div class="shortcut-row">
        <span class="shortcut-label">Next tab</span>
        <span class="keys"><kbd>⌥</kbd><kbd>Tab</kbd></span>
      </div>
      <div class="shortcut-row">
        <span class="shortcut-label">Previous tab</span>
        <span class="keys"><kbd>⌥</kbd><kbd>⇧</kbd><kbd>Tab</kbd></span>
      </div>
      <div class="shortcut-row">
        <span class="shortcut-label">Move selection</span>
        <span class="keys"><kbd>↑</kbd><kbd>↓</kbd></span>
      </div>
      <div class="shortcut-row">
        <span class="shortcut-label">Dismiss</span>
        <span class="keys"><kbd>Esc</kbd></span>
      </div>
    </div>
  </section>

  <button id="open-shortcuts" type="button">Change shortcuts</button>

  <script src="popup.js"></script>
</body>
</html>
